syntax = "proto3";

package sso;

option go_package = "./pb";

import "validate/validate.proto";

service auth {
  // 发送邮箱验证码
  rpc SendEmailCode(SendEmailCodeReq) returns (SendEmailCodeResp);

  // 邮箱注册
  rpc Register(RegisterReq) returns (LoginResp);

  // 邮箱登录
  rpc Login(LoginReq) returns (LoginResp);

  // 忘记密码（通过邮箱验证码重置）
  rpc ResetPassword(ResetPasswordReq) returns (CommonResp);

  // 修改密码（已登录状态，需旧密码验证）
  rpc ChangePassword(ChangePasswordReq) returns (CommonResp);

  // 刷新 Token
  rpc RefreshToken(RefreshTokenReq) returns (LoginResp);

  // 验证会话
  rpc VerifyToken(VerifyReq) returns (VerifyResp);

  // 登出
  rpc Logout(LogoutReq) returns (CommonResp);

  // 获取用户信息
  rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);

  // 更新用户信息
  rpc UpdateUserInfo(UpdateUserInfoReq) returns (CommonResp);

  // --- 用户统计相关 ---

  // 获取用户统计
  rpc GetUserStats(GetUserStatsReq) returns (GetUserStatsResp);

  // --- 治愈与情感服务相关 ---

  // 获取每日温柔文案
  rpc GetComfortMessage(GetComfortMessageReq) returns (GetComfortMessageResp);

  // --- 三方与扫码登录相关 ---

  // 三方登录
  rpc LoginByThirdParty(LoginByThirdPartyReq) returns (LoginResp);

  // 生成二维码
  rpc GenerateQrcode(GenerateQrcodeReq) returns (GenerateQrcodeResp);

  // 检查二维码状态
  rpc CheckQrcodeStatus(CheckQrcodeStatusReq) returns (CheckQrcodeStatusResp);

  // 确认二维码登录
  rpc ConfirmQrcodeLogin(ConfirmQrcodeLoginReq) returns (CommonResp);

  // --- 基础设施相关 ---

  // 媒体上传
  rpc UploadMedia(UploadMediaReq) returns (UploadMediaResp);
}

// ============ 验证码 ============
message SendEmailCodeReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"scene"
  string scene = 2 [
    (validate.rules).string = {
      in: ["register", "login", "reset_pwd"]
    },
    (validate.error_msg) = "场景参数错误，支持: register/login/reset_pwd"
  ];
}

message SendEmailCodeResp {
  // @inject_tag: json:"success"
  bool success = 1;
  // @inject_tag: json:"message"
  string message = 2;
  // @inject_tag: json:"expire_seconds"
  int32 expire_seconds = 3;
}

// ============ 注册 ============
message RegisterReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"email_code"
  string email_code = 2 [
    (validate.rules).string = {min_len: 4, max_len: 6},
    (validate.error_msg) = "验证码格式错误"
  ];

  // @inject_tag: json:"password"
  string password = 3 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "密码长度必须在8-32位之间"
  ];
}

// ============ 登录 ============
message LoginReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"password"
  string password = 2 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "密码长度必须在8-32位之间"
  ];
}

message LoginResp {
  // @inject_tag: json:"access_token"
  string access_token = 1;
  // @inject_tag: json:"access_token_expire"
  int64 access_token_expire = 2;
  // @inject_tag: json:"refresh_token"
  string refresh_token = 3;
  // @inject_tag: json:"refresh_token_expire"
  int64 refresh_token_expire = 4;
}

// ============ 忘记密码 ============
message ResetPasswordReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"email_code"
  string email_code = 2 [
    (validate.rules).string = {min_len: 4, max_len: 6},
    (validate.error_msg) = "验证码格式错误"
  ];

  // @inject_tag: json:"new_password"
  string new_password = 3 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "密码长度必须在8-32位之间"
  ];
}

// ============ 修改密码 ============
message ChangePasswordReq {
  // @inject_tag: json:"user_id"
  string user_id = 1;

  // @inject_tag: json:"old_password"
  string old_password = 2 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "旧密码长度必须在8-32位之间"
  ];

  // @inject_tag: json:"new_password"
  string new_password = 3 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "新密码长度必须在8-32位之间"
  ];
}

// ============ 刷新 Token ============
message RefreshTokenReq {
  // @inject_tag: json:"refresh_token"
  string refresh_token = 1 [
    (validate.rules).string.min_len = 1,
    (validate.error_msg) = "refresh_token 不能为空"
  ];
}

// ============ 验证会话 ============
message VerifyReq {
  // @inject_tag: json:"token"
  string token = 1 [
    (validate.rules).string.min_len = 1,
    (validate.error_msg) = "token 不能为空"
  ];
}

message VerifyResp {
  // @inject_tag: json:"user_id"
  string user_id = 1;
  // @inject_tag: json:"email"
  string email = 2;
}

// ============ 登出 ============
message LogoutReq {
  // @inject_tag: json:"token"
  string token = 1 [
    (validate.rules).string.min_len = 1,
    (validate.error_msg) = "token 不能为空"
  ];
}

// ============ 通用响应 ============
message CommonResp {
  // @inject_tag: json:"success"
  bool success = 1;
  // @inject_tag: json:"message"
  string message = 2;
}

// ============ 用户信息 ============
message UserInfo {
  // @inject_tag: json:"user_id"
  string user_id = 1;
  // @inject_tag: json:"email"
  string email = 2;
  // @inject_tag: json:"nickname"
  string nickname = 3;
  // @inject_tag: json:"avatar"
  string avatar = 4;
  // @inject_tag: json:"create_time"
  int64 create_time = 5;
  // @inject_tag: json:"bio"
  string bio = 6;
  // @inject_tag: json:"mood"
  string mood = 7;
}

message GetUserInfoReq {
  // @inject_tag: json:"user_id"
  string user_id = 1;
}

message GetUserInfoResp {
  // @inject_tag: json:"user"
  UserInfo user = 1;
}

message UpdateUserInfoReq {
  // @inject_tag: json:"user_id"
  string user_id = 1;
  // @inject_tag: json:"nickname"
  string nickname = 2;
  // @inject_tag: json:"avatar"
  string avatar = 3;
  // @inject_tag: json:"bio"
  string bio = 4;
  // @inject_tag: json:"mood"
  string mood = 5;
}

// ============ 用户统计 ============
message GetUserStatsReq {
  // @inject_tag: json:"user_id"
  string user_id = 1;
}

message GetUserStatsResp {
  // @inject_tag: json:"post_count"
  int64 post_count = 1;
  // @inject_tag: json:"resonance_count"
  int64 resonance_count = 2;
  // @inject_tag: json:"join_days"
  int64 join_days = 3;
}

// ============ 治愈与情感服务 ============
message GetComfortMessageReq {}

message GetComfortMessageResp {
  // @inject_tag: json:"title"
  string title = 1;
  // @inject_tag: json:"subtitle"
  string subtitle = 2;
  // @inject_tag: json:"button_text"
  string button_text = 3;
  // @inject_tag: json:"illustration_url"
  string illustration_url = 4;
}

// ============ 三方与扫码登录 ============
message LoginByThirdPartyReq {
  // @inject_tag: json:"platform"
  string platform = 1; // wechat | qq | alipay
  // @inject_tag: json:"code"
  string code = 2;
}

message GenerateQrcodeReq {
  // @inject_tag: json:"device_id"
  string device_id = 1;
}

message GenerateQrcodeResp {
  // @inject_tag: json:"qid"
  string qid = 1;
  // @inject_tag: json:"image_url"
  string image_url = 2;
}

message CheckQrcodeStatusReq {
  // @inject_tag: json:"qid"
  string qid = 1;
}

message CheckQrcodeStatusResp {
  // @inject_tag: json:"status"
  string status = 1; // WAITING | SCANNED | CONFIRMED | EXPIRED
  // @inject_tag: json:"access_token"
  string access_token = 2;
  // @inject_tag: json:"refresh_token"
  string refresh_token = 3;
}

message ConfirmQrcodeLoginReq {
  // @inject_tag: json:"qid"
  string qid = 1;
  // @inject_tag: json:"user_id"
  string user_id = 2;
}

// ============ 基础设施相关 ============
message UploadMediaReq {
  // @inject_tag: json:"user_id"
  string user_id = 1;
  // @inject_tag: json:"usage"
  string usage = 2; // avatar | post
  // @inject_tag: json:"content"
  bytes content = 3;
  // @inject_tag: json:"filename"
  string filename = 4;
}

message UploadMediaResp {
  // @inject_tag: json:"url"
  string url = 1;
}
