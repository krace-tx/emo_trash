syntax = "proto3";

package sso;

option go_package = "./pb";

import "validate/validate.proto";

service auth {
  // 发送邮箱验证码
  rpc SendEmailCode(SendEmailCodeReq) returns (SendEmailCodeResp);

  // 邮箱注册
  rpc Register(RegisterReq) returns (LoginResp);

  // 邮箱登录
  rpc Login(LoginReq) returns (LoginResp);

  // 忘记密码（通过邮箱验证码重置）
  rpc ResetPassword(ResetPasswordReq) returns (CommonResp);

  // 修改密码（已登录状态，需旧密码验证）
  rpc ChangePassword(ChangePasswordReq) returns (CommonResp);

  // 刷新 Token
  rpc RefreshToken(RefreshTokenReq) returns (LoginResp);

  // 验证会话
  rpc VerifyToken(VerifyReq) returns (VerifyResp);

  // 登出
  rpc Logout(LogoutReq) returns (CommonResp);

  // 获取用户信息
  rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);

  // 更新用户信息
  rpc UpdateUserInfo(UpdateUserInfoReq) returns (CommonResp);
}

// ============ 验证码 ============
message SendEmailCodeReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"scene"
  string scene = 2 [
    (validate.rules).string = {
      in: ["register", "login", "reset_pwd"]
    },
    (validate.error_msg) = "场景参数错误，支持: register/login/reset_pwd"
  ];
}

message SendEmailCodeResp {
  // @inject_tag: json:"success"
  bool success = 1;
  // @inject_tag: json:"message"
  string message = 2;
  // @inject_tag: json:"expire_seconds"
  int32 expire_seconds = 3;
}

// ============ 注册 ============
message RegisterReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"email_code"
  string email_code = 2 [
    (validate.rules).string = {min_len: 4, max_len: 6},
    (validate.error_msg) = "验证码格式错误"
  ];

  // @inject_tag: json:"password"
  string password = 3 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "密码长度必须在8-32位之间"
  ];
}

// ============ 登录 ============
message LoginReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"password"
  string password = 2 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "密码长度必须在8-32位之间"
  ];
}

message LoginResp {
  // @inject_tag: json:"access_token"
  string access_token = 1;
  // @inject_tag: json:"access_token_expire"
  int64 access_token_expire = 2;
  // @inject_tag: json:"refresh_token"
  string refresh_token = 3;
  // @inject_tag: json:"refresh_token_expire"
  int64 refresh_token_expire = 4;
}

// ============ 忘记密码 ============
message ResetPasswordReq {
  // @inject_tag: json:"email"
  string email = 1 [
    (validate.rules).string.email = true,
    (validate.error_msg) = "邮箱格式错误"
  ];

  // @inject_tag: json:"email_code"
  string email_code = 2 [
    (validate.rules).string = {min_len: 4, max_len: 6},
    (validate.error_msg) = "验证码格式错误"
  ];

  // @inject_tag: json:"new_password"
  string new_password = 3 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "密码长度必须在8-32位之间"
  ];
}

// ============ 修改密码 ============
message ChangePasswordReq {
  // @inject_tag: json:"old_password"
  string old_password = 1 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "旧密码长度必须在8-32位之间"
  ];

  // @inject_tag: json:"new_password"
  string new_password = 2 [
    (validate.rules).string = {min_len: 8, max_len: 32},
    (validate.error_msg) = "新密码长度必须在8-32位之间"
  ];
}

// ============ 刷新 Token ============
message RefreshTokenReq {
  // @inject_tag: json:"refresh_token"
  string refresh_token = 1 [
    (validate.rules).string.min_len = 1,
    (validate.error_msg) = "refresh_token 不能为空"
  ];
}

// ============ 验证会话 ============
message VerifyReq {
  // @inject_tag: json:"token"
  string token = 1 [
    (validate.rules).string.min_len = 1,
    (validate.error_msg) = "token 不能为空"
  ];
}

message VerifyResp {
  // @inject_tag: json:"user_id"
  string user_id = 1;
  // @inject_tag: json:"email"
  string email = 2;
}

// ============ 登出 ============
message LogoutReq {
  // @inject_tag: json:"token"
  string token = 1 [
    (validate.rules).string.min_len = 1,
    (validate.error_msg) = "token 不能为空"
  ];
}

// ============ 通用响应 ============
message CommonResp {
  // @inject_tag: json:"success"
  bool success = 1;
  // @inject_tag: json:"message"
  string message = 2;
}

// ============ 用户信息 ============
message UserInfo {
  // @inject_tag: json:"user_id"
  string user_id = 1;
  // @inject_tag: json:"email"
  string email = 2;
  // @inject_tag: json:"nickname"
  string nickname = 3;
  // @inject_tag: json:"avatar"
  string avatar = 4;
  // @inject_tag: json:"create_time"
  int64 create_time = 5;
  // @inject_tag: json:"bio"
  string bio = 6;
  // @inject_tag: json:"mood"
  string mood = 7;
}

message GetUserInfoReq {
  // @inject_tag: json:"user_id"
  string user_id = 1;
}

message GetUserInfoResp {
  // @inject_tag: json:"user"
  UserInfo user = 1;
}

message UpdateUserInfoReq {
  // @inject_tag: json:"user_id"
  string user_id = 1;
  // @inject_tag: json:"nickname"
  string nickname = 2;
  // @inject_tag: json:"avatar"
  string avatar = 3;
  // @inject_tag: json:"bio"
  string bio = 4;
  // @inject_tag: json:"mood"
  string mood = 5;
}