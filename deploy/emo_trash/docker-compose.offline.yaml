# Offline: use after docker load from deploy/offline/images/*.tar (no registry pull).
#   docker compose -f docker-compose.offline.yaml up -d
services:
  redis:
    image: redis:7.2-alpine
    pull_policy: never
    container_name: emo-trash-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=emoTrashRedis123!
      - REDIS_MAXMEMORY=512mb
      - REDIS_MAXMEMORY_POLICY=allkeys-lru
    networks:
      - emo-trash-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "emoTrashRedis123!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8
    pull_policy: never
    container_name: emo-trash-mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=emoTrashMysql123!
      - MYSQL_DATABASE=emo_trash
      - MYSQL_USER=emo_user
      - MYSQL_PASSWORD=emoUser123!
      - TZ=Asia/Shanghai
    networks:
      - emo-trash-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uemo_user", "-pemoUser123!"]
      interval: 15s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:6.0
    pull_policy: never
    container_name: emo-trash-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=emoTrashMongo123!
      - MONGO_INITDB_DATABASE=emo_trash
    networks:
      - emo-trash-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "root", "-p", "emoTrashMongo123!"]
      interval: 15s
      timeout: 5s
      retries: 3

  etcd:
    image: bitnamilegacy/etcd:3.5.18
    pull_policy: never
    restart: always
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      - ETCDCTL_API=3
      - ETCD_NAME=etcd-node-1
      - ETCD_DATA_DIR=/etcd-data
      - ETCD_ROOT_PASSWORD=emoTrashEtcd123!
      - ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=etcd-node-1=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-token
      - ETCD_INITIAL_CLUSTER_STATE=new
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379", "--user=root:emoTrashEtcd123!"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
  mysql-data:
  mongo-data:
  etcd-data:

networks:
  emo-trash-network:
    driver: bridge
    name: emo-trash-network
